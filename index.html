<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collezione Birre</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 id="title">🍺 Collezione Etichette Birra</h1>

<p>Archivio mondiale di etichette birra</p>

<div id="grid" class="card-grid"></div>

<script>
const data = {
  "Italia": ["Moretti", "Peroni"],
  "Germania": ["Becks", "Warsteiner"],
  "Francia": ["Kronenbourg"],
  "Giappone": ["Asahi", "Sapporo"],
  "USA": ["Budweiser", "Coors"]
};


function getFlagCode(country) {

  const flags = {
    "Italia": "it",
    "Germania": "de",
    "Francia": "fr",
    "Giappone": "jp",
    "USA": "us",
    "Spagna": "es",
    "Regno Unito": "gb",
    "Canada": "ca",
    "Belgio": "be"
  };

  return flags[country] || "un";
}
const grid = document.getElementById("grid");
const title = document.getElementById("title");

function showHome() {
  title.innerText = "🍺 Collezione Etichette Birra";

 grid.innerHTML = countries.map(country => `

  <a class="country-card"
     href="${country}/index.html">

    <img src="img/${country.toLowerCase()}.jpg"
         alt="${country}">

    <img class="flag"
         src="https://flagcdn.com/w40/${getFlagCode(country)}.png"
         alt="${country}">

    <div class="country-name">${country}</div>

  </a>

`).join("");

function showCountry(country) {
  title.innerText = country;

  const list = data[country];

  grid.innerHTML = `
    <button class="button" onclick="showHome()">⬅ Torna indietro</button>
  ` + list.map(b => `
    <div class="country-card">
      <div class="country-name">${b}</div>
    </div>
  `).join("");
}

showHome();
</script>

</body>
</html>
